openapi: 3.1.0
info:
  title: lembar API
  version: 0.1.0
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
  description: >-
    Baseline contract for planning. The backend repository owns the executable OpenAPI
    document. This file does not authorize implementation of every path at once.
servers:
  - url: /
    description: Current API origin or configured same-origin gateway
tags:
  - name: System
    description: Health and service metadata.
  - name: Identity
    description: Current account, session, and workspace context.
  - name: Catalog
    description: Versioned curriculum, grade, subject, and material options.
  - name: Sources
    description: Private source upload and processing lifecycle.
  - name: Assessments
    description: Assessment drafts, versions, review, and finalization.
  - name: Jobs
    description: Neutral asynchronous job state.
  - name: Outputs
    description: Export artifacts and controlled sharing.
  - name: Marketing
    description: Published structured marketing content.
  - name: MarketingOps
    description: Superadmin-only marketing authoring and publication.
paths:
  /health:
    get:
      summary: Read service health
      tags: [System]
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /v1/me:
    get:
      summary: Read the current account and workspace options
      tags: [Identity]
      operationId: getCurrentAccount
      responses:
        '200':
          description: Current account and available workspaces
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/catalog/grades:
    get:
      summary: List available grades
      tags: [Catalog]
      operationId: listGrades
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
      responses:
        '200':
          description: Available grades
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CatalogOption'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/catalog/subjects:
    get:
      summary: List subjects for a grade and curriculum version
      tags: [Catalog]
      operationId: listSubjects
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - in: query
          name: gradeId
          required: true
          schema: { type: string }
        - in: query
          name: curriculumVersionId
          required: false
          schema: { type: string }
      responses:
        '200':
          description: Available subjects
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CatalogOption'
        '400':
          $ref: '#/components/responses/ValidationError'
  /v1/catalog/materials:
    get:
      summary: List materials for the selected catalog context
      tags: [Catalog]
      operationId: listMaterials
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - in: query
          name: gradeId
          required: true
          schema: { type: string }
        - in: query
          name: subjectId
          required: true
          schema: { type: string }
        - in: query
          name: curriculumVersionId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Available materials
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CatalogOption'
        '400':
          $ref: '#/components/responses/ValidationError'
  /v1/sources/upload-intents:
    post:
      summary: Create a private PDF upload intent
      tags: [Sources]
      operationId: createSourceUploadIntent
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName, contentType, sizeBytes]
              properties:
                fileName: { type: string, maxLength: 200 }
                contentType: { type: string, const: application/pdf }
                sizeBytes: { type: integer, minimum: 1 }
      responses:
        '201':
          description: Upload intent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadIntentResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /v1/sources/{sourceId}:
    get:
      summary: Read source processing state
      tags: [Sources]
      operationId: getSource
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/SourceId'
      responses:
        '200':
          description: Source state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/assessments:
    get:
      summary: List assessments in the active workspace
      tags: [Assessments]
      operationId: listAssessments
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Assessment page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create an assessment draft and generation job
      tags: [Assessments]
      operationId: createAssessment
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssessmentRequest'
      responses:
        '201':
          description: Draft and generation job created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [assessmentId, jobId, status]
                    properties:
                      assessmentId: { type: string }
                      jobId: { type: string }
                      status: { $ref: '#/components/schemas/JobStatus' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/assessments/{assessmentId}:
    get:
      summary: Read an assessment
      tags: [Assessments]
      operationId: getAssessment
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/AssessmentId'
      responses:
        '200':
          description: Assessment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/assessments/{assessmentId}/finalize:
    post:
      summary: Finalize the reviewed assessment version
      tags: [Assessments]
      operationId: finalizeAssessment
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/AssessmentId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: Final version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssessmentResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/assessments/{assessmentId}/exports:
    post:
      summary: Create an export job for a final assessment
      tags: [Outputs]
      operationId: createAssessmentExport
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/AssessmentId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [format]
              properties:
                format: { type: string, enum: [pdf] }
                includeAnswerKey: { type: boolean, default: true }
                includeExplanation: { type: boolean, default: false }
      responses:
        '202':
          description: Export job accepted
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [jobId, status]
                    properties:
                      jobId: { type: string }
                      status: { $ref: '#/components/schemas/JobStatus' }
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/jobs/{jobId}:
    get:
      summary: Read asynchronous job state
      tags: [Jobs]
      operationId: getJob
      parameters:
        - $ref: '#/components/parameters/WorkspaceId'
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/public/marketing/global:
    get:
      summary: Read published global marketing content
      tags: [Marketing]
      operationId: getPublishedMarketingGlobal
      security: []
      parameters:
        - in: query
          name: locale
          schema: { type: string, default: id-ID }
      responses:
        '200':
          description: Published navigation, footer, CTA, and default SEO
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketingGlobalResponse'
        '304':
          description: Cached representation is current
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/public/marketing/pages/{slug}:
    get:
      summary: Read a published marketing page
      tags: [Marketing]
      operationId: getPublishedMarketingPage
      security: []
      parameters:
        - $ref: '#/components/parameters/MarketingSlug'
        - in: query
          name: locale
          schema: { type: string, default: id-ID }
      responses:
        '200':
          description: Published structured page
          headers:
            ETag: { schema: { type: string } }
            Cache-Control: { schema: { type: string } }
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketingPageResponse'
        '304':
          description: Cached representation is current
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/ops/marketing/pages:
    get:
      summary: List marketing pages and authoring state
      tags: [MarketingOps]
      operationId: listMarketingPagesForOps
      responses:
        '200':
          description: Page and version summaries
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/MarketingPageSummary' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /v1/ops/marketing/pages/{slug}:
    get:
      summary: Read marketing page authoring state
      tags: [MarketingOps]
      operationId: getMarketingPageForOps
      parameters:
        - $ref: '#/components/parameters/MarketingSlug'
      responses:
        '200':
          description: Current draft, published version, and version summaries
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MarketingOpsPageResponse' }
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/ops/marketing/pages/{slug}/draft:
    put:
      summary: Save a structured marketing page draft
      tags: [MarketingOps]
      operationId: saveMarketingPageDraft
      parameters:
        - $ref: '#/components/parameters/MarketingSlug'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SaveMarketingDraftRequest' }
      responses:
        '200':
          description: Draft saved with a new revision
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MarketingOpsPageResponse' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/ops/marketing/pages/{slug}/preview:
    get:
      summary: Read authenticated no-store draft preview
      tags: [MarketingOps]
      operationId: previewMarketingPageDraft
      parameters:
        - $ref: '#/components/parameters/MarketingSlug'
      responses:
        '200':
          description: Draft projection for the shared frontend renderer
          headers:
            Cache-Control:
              schema: { type: string, const: no-store }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MarketingPageResponse' }
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /v1/ops/marketing/pages/{slug}/publish:
    post:
      summary: Publish the current validated draft
      tags: [MarketingOps]
      operationId: publishMarketingPageDraft
      parameters:
        - $ref: '#/components/parameters/MarketingSlug'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: Immutable version published
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MarketingOpsPageResponse' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/ops/marketing/pages/{slug}/unpublish:
    post:
      summary: Remove the current page from public delivery
      tags: [MarketingOps]
      operationId: unpublishMarketingPage
      parameters:
        - $ref: '#/components/parameters/MarketingSlug'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: Public pointer cleared with audit
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MarketingOpsPageResponse' }
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /v1/ops/marketing/pages/{slug}/versions/{version}/restore:
    post:
      summary: Copy a historical version into a new draft
      tags: [MarketingOps]
      operationId: restoreMarketingPageVersion
      parameters:
        - $ref: '#/components/parameters/MarketingSlug'
        - in: path
          name: version
          required: true
          schema: { type: integer, minimum: 1 }
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '201':
          description: New draft created from the selected version
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MarketingOpsPageResponse' }
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: __Host-lembar_session
  parameters:
    WorkspaceId:
      in: header
      name: X-Workspace-Id
      required: true
      schema: { type: string }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: true
      schema: { type: string, minLength: 16, maxLength: 128 }
    CsrfToken:
      in: header
      name: X-CSRF-Token
      required: true
      schema: { type: string }
    IfMatch:
      in: header
      name: If-Match
      required: true
      schema: { type: string }
    MarketingSlug:
      in: path
      name: slug
      required: true
      schema:
        type: string
        enum: [home, untuk-sekolah, harga]
    Cursor:
      in: query
      name: cursor
      required: false
      schema: { type: string }
    Limit:
      in: query
      name: limit
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    AssessmentId:
      in: path
      name: assessmentId
      required: true
      schema: { type: string }
    SourceId:
      in: path
      name: sourceId
      required: true
      schema: { type: string }
    JobId:
      in: path
      name: jobId
      required: true
      schema: { type: string }
  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Authenticated actor lacks the required platform role
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found or not visible
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ValidationError:
      description: Invalid input
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: Version, state, or idempotency conflict
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    HealthResponse:
      type: object
      required: [status, service, timestamp]
      properties:
        status: { type: string, const: ok }
        service: { type: string, const: lembar-api }
        timestamp: { type: string, format: date-time }
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId, retryable]
          properties:
            code: { type: string }
            message: { type: string }
            fieldErrors:
              type: object
              additionalProperties:
                type: array
                items: { type: string }
            requestId: { type: string }
            retryable: { type: boolean }
    WorkspaceSummary:
      type: object
      required: [id, type, name, role]
      properties:
        id: { type: string }
        type: { type: string, enum: [personal, school] }
        name: { type: string }
        role: { type: string, enum: [teacher, school_admin] }
    MeResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [account, workspaces]
          properties:
            account:
              type: object
              required: [id, displayName]
              properties:
                id: { type: string }
                displayName: { type: string }
            workspaces:
              type: array
              items: { $ref: '#/components/schemas/WorkspaceSummary' }
    CatalogOption:
      type: object
      required: [id, label, status]
      properties:
        id: { type: string }
        label: { type: string }
        status: { type: string, enum: [active, archived, unavailable] }
    UploadIntentResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [sourceId, uploadUrl, expiresAt]
          properties:
            sourceId: { type: string }
            uploadUrl: { type: string, format: uri }
            expiresAt: { type: string, format: date-time }
    SourceResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, type, status, fileName]
          properties:
            id: { type: string }
            type: { type: string, enum: [catalog, pdf] }
            status: { type: string, enum: [uploading, processing, ready, failed, deleted] }
            fileName: { type: string }
            pageCount: { type: [integer, 'null'] }
            failureCode: { type: [string, 'null'] }
    CreateAssessmentRequest:
      type: object
      required:
        - sourceMode
        - gradeId
        - curriculumVersionId
        - subjectId
        - materialIds
        - assessmentType
        - difficulty
        - questionCount
        - reviewMode
      properties:
        sourceMode: { type: string, enum: [catalog, own_pdf, catalog_and_own_pdf] }
        sourceIds:
          type: array
          items: { type: string }
        gradeId: { type: string }
        curriculumVersionId: { type: string }
        subjectId: { type: string }
        materialIds:
          type: array
          minItems: 1
          items: { type: string }
        assessmentType: { type: string, enum: [practice, daily, midterm, final, tka] }
        difficulty: { type: string, enum: [easy, medium, hard, mixed] }
        questionCount: { type: integer, minimum: 5, maximum: 50, default: 20 }
        reviewMode: { type: string, enum: [quick, detail] }
        teacherFocus: { type: string, maxLength: 500 }
        exampleQuestion: { type: string, maxLength: 3000 }
    AssessmentSummary:
      type: object
      required: [id, title, status, gradeLabel, subjectLabel, updatedAt]
      properties:
        id: { type: string }
        title: { type: string }
        status: { type: string, enum: [draft, generating, review, final, archived] }
        gradeLabel: { type: string }
        subjectLabel: { type: string }
        updatedAt: { type: string, format: date-time }
    AssessmentPage:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/AssessmentSummary' }
        page:
          type: object
          required: [hasMore]
          properties:
            nextCursor: { type: [string, 'null'] }
            hasMore: { type: boolean }
    AssessmentResponse:
      type: object
      required: [data]
      properties:
        data:
          allOf:
            - $ref: '#/components/schemas/AssessmentSummary'
            - type: object
              required: [questionCount, reviewedCount]
              properties:
                questionCount: { type: integer }
                reviewedCount: { type: integer }
                currentVersion: { type: integer }
    JobStatus:
      type: string
      enum:
        - queued
        - preparing
        - generating
        - validating
        - rendering
        - completed
        - partially_failed
        - failed
        - cancelled
    JobResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [id, kind, status, stage, createdAt, updatedAt]
          properties:
            id: { type: string }
            kind: { type: string, enum: [source_ingestion, assessment_generation, export] }
            status: { $ref: '#/components/schemas/JobStatus' }
            stage: { type: string }
            progressCurrent: { type: [integer, 'null'] }
            progressTotal: { type: [integer, 'null'] }
            failureCode: { type: [string, 'null'] }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
    MarketingCta:
      type: object
      additionalProperties: false
      required: [id, label, href, variant, placement, audience, trackingKey, enabled]
      properties:
        id: { type: string, minLength: 1, maxLength: 80 }
        label: { type: string, minLength: 1, maxLength: 120 }
        href: { type: string, minLength: 1, maxLength: 500 }
        variant: { type: string, enum: [primary, secondary, text] }
        placement: { type: string, minLength: 1, maxLength: 80 }
        audience: { type: string, enum: [all, teacher, school] }
        trackingKey: { type: string, minLength: 1, maxLength: 100 }
        enabled: { type: boolean }
        external: { type: boolean, default: false }
        accessibleLabel: { type: [string, 'null'], maxLength: 160 }
    MarketingBlockItem:
      type: object
      additionalProperties: false
      required: [id, title]
      properties:
        id: { type: string }
        title: { type: string, maxLength: 200 }
        body: { type: [string, 'null'], maxLength: 2000 }
        mediaAssetId: { type: [string, 'null'] }
        cta: { oneOf: [{ $ref: '#/components/schemas/MarketingCta' }, { type: 'null' }] }
    MarketingBlock:
      type: object
      additionalProperties: false
      required: [id, type]
      properties:
        id: { type: string, minLength: 1, maxLength: 80 }
        type:
          type: string
          enum: [hero, product_proof, workflow, audience, trust, pricing, faq, final_cta]
        eyebrow: { type: [string, 'null'], maxLength: 120 }
        heading: { type: [string, 'null'], maxLength: 300 }
        body: { type: [string, 'null'], maxLength: 4000 }
        theme: { type: string, enum: [light, dark, accent], default: light }
        mediaAssetId: { type: [string, 'null'] }
        ctas:
          type: array
          maxItems: 4
          items: { $ref: '#/components/schemas/MarketingCta' }
        items:
          type: array
          maxItems: 20
          items: { $ref: '#/components/schemas/MarketingBlockItem' }
    MarketingSeo:
      type: object
      additionalProperties: false
      required: [title, description]
      properties:
        title: { type: string, minLength: 1, maxLength: 70 }
        description: { type: string, minLength: 1, maxLength: 180 }
        imageAssetId: { type: [string, 'null'] }
        noIndex: { type: boolean, default: false }
