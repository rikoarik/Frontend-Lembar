status_values:
  - BACKLOG
  - BLOCKED
  - READY
  - IN_PROGRESS
  - PAUSED
  - READY_FOR_OWNER_REVIEW
  - CHANGES_REQUESTED
  - ACCEPTED
  - CANCELLED

rules:
  owner_starts_with: "START <TASK-ID>"
  owner_accepts_with: "ACCEPT <TASK-ID>"
  owner_requests_changes_with: "CHANGES_REQUESTED <TASK-ID>: <reason>"
  max_in_progress_per_repository: 1
  max_context_documents_per_task: 3
  max_handoff_words: 500
  nested_agent_spawn: forbidden_unless_owner_explicit
  auto_start_next_task: false
  auto_merge: false
  production_actions_default: forbidden

