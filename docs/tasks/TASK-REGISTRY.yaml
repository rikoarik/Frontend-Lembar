rules:
  owner_starts_with: 'START <TASK-ID>'
  owner_accepts_with: 'ACCEPT <TASK-ID>'
  owner_requests_changes_with: 'CHANGES_REQUESTED <TASK-ID>: <reason>'
  max_in_progress_per_repository: 5
  max_context_documents_per_task: 3
  max_handoff_words: 500
  nested_agent_spawn: orchestrator_only
  auto_start_next_task: true
  auto_merge: true
  auto_review_and_correct: true
  auto_commit: true
  auto_push_task_branches: true
  auto_push_integration_branch: true
  direct_main_merge_push: forbidden
  force_push: forbidden
  destructive_ops: forbidden
  production_deploy: forbidden
  paid_resources: forbidden
  production_secrets: forbidden
  production_actions_default: forbidden
  backend_repository_modifications: forbidden
  api_endpoint_invention: forbidden
  execution_target: COMPLETE_LEMBAR_WEB_V1
  execution_mode: continuous_until_complete
  automatic_resume: true
  continue_without_owner_between_tasks: true
  marketing_visual_baseline: origin/main@299fd95d2d232e87ca972d52daa89a24458b967e
  shutdown_checkpoint_mode: true

execution_notes:
  latest_owner_directive:
    recorded_at: '2026-07-19T17:37:00+07:00'
    summary: 'DEFER OWNER REVIEW UNTIL COMPLETE FRONTEND V1 IS LANDED ON DEV. Orchestrator reviews, accepts, corrects, verifies, promotes to dev autonomously. Final owner review only when all applicable FE V1 scope lands on dev.'
    source: 'OWNER_DIRECTIVE — DEFER OWNER REVIEW UNTIL COMPLETE FRONTEND V1 IS LANDED ON DEV (2026-07-19 mid-conversation)'
    decision_rules:
      - 'Orchestrator performs review on behalf of owner using accepted repo documents and Figma as authority.'
      - 'Only five exception categories require owner input before final completion: genuine material contradiction in accepted sources, material product/permission/pricing/privacy/architecture choice, destructive/irreversible action, production deployment/secrets/paid resource, irreconcilable backend contract after focused retries.'
      - 'Ordinary UI states, design decisions, merges, sprints, verification, and promotion decisions are orchestrator-owned and do not require owner approval.'
    merge_policy:
      - 'task branch → ao/frontend-integration → dev → owner final review → main (only after separate release authorization)'
      - 'Promote to dev only after combined CI is green on integration.'
      - 'Never merge to main automatically.'
    final_review_trigger: 'All applicable Frontend-Lembar V1 responsibility landed on dev and passing required checks.'
    required_behaviors:
      - 'Do not stop after current sprint/phase/merge/handoff; auto-start next eligible frontend task.'
      - 'Checkpoint and push meaningful progress at least every 10–15 minutes while unpushed changes exist.'
      - 'Preserve existing workers/branches when recoverable; use fresh workers only for new tasks or dead workers.'
      - 'Do not silently reduce scope to MVP placeholders or static mockups.'
      - 'Record blockers, evidence, branch, commit SHA, and exact resume action in TASK-REGISTRY.yaml.'
      - 'Persist critical orchestration state before manual or automatic compaction, then resume automatically from TASK-REGISTRY.yaml and git state.'
      - 'Do not ask the owner to run /compact; allow automatic compaction and rehydrate from repository state.'
      - 'Issue internal START gates automatically for eligible frontend tasks after dependency and ownership checks.'
    current_resume_focus:
      - 'F1-08 ACCEPTED; F1-09 ACCEPTED (shared MarketingNavbar via MarketingLayout; page-local navs removed from /harga and /untuk-sekolah).'
      - 'Next READY frontend-only: F1-10 invitation UI, F1-11 share viewer, F0-08 print foundation, F2-06/07/08 settings, F6-12/13 shell placeholders.'
      - 'Auto-start next READY, verify, promote integration → dev, continue without owner handoff until complete Frontend V1 on dev.'
  context_management:
    source_of_truth:
      - TASK-REGISTRY.yaml
      - accepted repository decisions
      - PRD/design/architecture/UX docs
      - backend-owned OpenAPI and generated clients
      - git task branches
      - ao/frontend-integration
      - persisted verification evidence
      - latest remote commit history
    pre_compaction_requirements:
      - 'Inspect active frontend workers and task branches.'
      - 'Update TASK-REGISTRY.yaml with active/completed/blocked tasks, ownership, integration status, verification state, latest pushed SHA, and exact next action.'
    dev_commit: d5bfc47
      - 'Commit and push meaningful checkpoint progress before compaction when time allows.'
      - 'Do not leave critical execution state only in conversation history.'
    post_compaction_rehydration:
      - 'Read repository instructions and TASK-REGISTRY.yaml first.'
      - 'Inspect git status, remote updates, ao/frontend-integration, and interrupted task branches.'
      - 'Reconstruct active workers, completed work, remaining work, dependencies, verification, and integration status from persisted state.'
      - 'Resume automatically from the latest valid checkpoint without duplicating tasks, workers, branches, routes, or completed work.'
    compaction_policy:
      auto_compaction_enabled: true
      manual_compaction_by_owner_not_required: true
      shell_compact_forbidden: true
      continue_execution_after_compaction: true
      exact_context_percentage_claims_when_unavailable: forbidden
      stop_for_compaction: forbidden
      stop_for_context_pressure: forbidden
      stop_for_host_recovery: forbidden
      stop_for_worker_completion: forbidden
      stop_for_mvp_placeholder_completion: forbidden
      stop_only_when_complete_or_genuine_owner_decision_required: true
  branch_policy:
    stable_branch: main
    shared_development_branch: dev
    integration_branch: ao/frontend-integration
    task_branch_patterns:
      - feat/<task-id>-<description>
      - fix/<task-id>-<description>
      - chore/<task-id>-<description>
    permanent_rules:
      - 'Never modify, merge into, or push directly to main automatically.'
      - 'Create dev from the current valid main baseline when missing, then push dev.'
      - 'Keep accepted task branches flowing into ao/frontend-integration first; only promote stable verified batches from ao/frontend-integration into dev.'
      - 'Never merge task branches directly to main and never merge ao/frontend-integration directly to main.'
      - 'Never force-push or rewrite shared branch history for main, dev, ao/frontend-integration, or task branches.'
      - 'Do not promote ao/frontend-integration to dev while incomplete, placeholder, experimental, or unverified work remains.'
    current_state:
      recorded_at: '2026-07-19T19:50:00+07:00'
      main_commit: '299fd95d2d232e87ca972d52daa89a24458b967e'
      dev_commit: '921e5bb0a88faccb52145d4c028e964d385c9cf5'
      dev_status: 'exists-and-active-from-promotion'
      integration_branch: ao/frontend-integration
      integration_commit: 'c5cc700b761c966dd61ee398b79b0b27621c6ae8'
      promotion_gate: 'Integration CI all-green; promotion to dev is orchestrator-owned per current owner directive.'
      next_branch_action: 'ACCEPT F1-09 complete; push integration; promote to dev after CI green; start next READY (F1-10 or F0-08/F2-06/F6-12).'

