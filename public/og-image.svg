<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="og-title">
  <title id="og-title">lembar</title>
  <!-- Paper background -->
  <rect width="1200" height="630" fill="#FBF9F4" />

  <!-- Subtle sheet outline referencing the product output (no fabricated copy) -->
  <g transform="translate(720,120)" fill="#FFFFFF" stroke="#DEDED8" stroke-width="1">
    <rect width="320" height="390" rx="8" ry="8" />
    <line x1="40" y1="80" x2="280" y2="80" stroke="#DEDED8" stroke-width="2" />
    <line x1="40" y1="130" x2="280" y2="130" stroke="#E8E5DE" stroke-width="2" />
    <line x1="40" y1="180" x2="280" y2="180" stroke="#E8E5DE" stroke-width="2" />
    <line x1="40" y1="230" x2="280" y2="230" stroke="#E8E5DE" stroke-width="2" />
    <line x1="40" y1="280" x2="280" y2="280" stroke="#E8E5DE" stroke-width="2" />
    <line x1="40" y1="330" x2="200" y2="330" stroke="#E8E5DE" stroke-width="2" />
  </g>

  <!-- Brand mark: monogram block referencing the burgundy mark color -->
  <g transform="translate(120,240)">
    <rect width="120" height="120" rx="14" ry="14" fill="#A1262F" />
    <text x="60" y="92" font-family="Inter, system-ui, sans-serif" font-weight="700"
          font-size="96" fill="#FBF9F4" text-anchor="middle">l</text>
  </g>

  <!-- Wordmark, lowercase per brand rule -->
  <text x="120" y="470" font-family="Inter, system-ui, sans-serif" font-weight="600"
        font-size="96" fill="#171717">lembar</text>

  <!-- Accent rule -->
  <line x1="120" y1="500" x2="320" y2="500" stroke="#A1262F" stroke-width="4" />
</svg>
